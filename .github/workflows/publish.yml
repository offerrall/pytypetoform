name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv pip install --system -e ".[dev]"
      - run: ruff format --check src
      - run: ruff check src
      - run: mypy src
      - run: pytest
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
